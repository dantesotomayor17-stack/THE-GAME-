<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Minas Pro - Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cell-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .mine-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); border-color: rgba(239, 68, 68, 0.8); }
        .grid-container { perspective: 1000px; }
        .sync-indicator { transition: all 0.3s; }
        .syncing { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl shadow-slate-950/50 p-6 border border-slate-700">
        
        <!-- Header con estado de Firebase -->
        <div class="text-center mb-6">
            <div class="flex justify-center items-center gap-2 mb-2">
                <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    Radar de Minas
                </h1>
                <div id="firebaseStatus" class="sync-indicator w-3 h-3 rounded-full bg-gray-500"></div>
            </div>
            <p id="connectionText" class="text-slate-400 text-xs mb-2">Conectando...</p>
            <p class="text-slate-400 text-sm">Predicción con historial en la nube</p>
        </div>

        <!-- Stats Badge -->
        <div class="flex justify-center gap-2 mb-6">
            <div id="historyStatus" class="bg-blue-900/50 text-blue-300 text-xs font-semibold px-4 py-1.5 rounded-full border border-blue-800/50 flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                Rondas: 0
            </div>
            <div id="accuracyBadge" class="hidden bg-emerald-900/50 text-emerald-300 text-xs font-semibold px-4 py-1.5 rounded-full border border-emerald-800/50">
                Precisión: --%
            </div>
        </div>

        <!-- Grid Container -->
        <div class="grid-container mb-8">
            <div id="mineGrid" class="grid grid-cols-5 gap-2 w-full max-w-[300px] mx-auto aspect-square">
                <!-- Cells generated here -->
            </div>
        </div>

        <!-- Controls -->
        <div class="space-y-3">
            <button id="btnRegister" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-900/20 transform active:scale-[0.98] transition-all flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
                <span id="btnText">Calcular Próxima Ronda</span>
            </button>
            
            <div class="flex gap-3">
                <button id="btnReset" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-2.5 px-4 rounded-xl transition-colors text-sm">
                    Limpiar
                </button>
                <button id="btnClearHistory" class="flex-1 bg-red-900/30 hover:bg-red-900/50 text-red-400 border border-red-900/50 font-medium py-2.5 px-4 rounded-xl transition-colors text-sm">
                    Borrar Todo
                </button>
            </div>
            
            <div class="flex gap-3 pt-2 border-t border-slate-700">
                <button id="btnExport" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-2.5 px-4 rounded-xl transition-colors text-xs">
                    📥 Exportar Datos
                </button>
                <button id="btnImport" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-2.5 px-4 rounded-xl transition-colors text-xs">
                     Importar Datos
                </button>
            </div>
        </div>

        <!-- User Info -->
        <div id="userInfo" class="mt-4 pt-4 border-t border-slate-700 text-center text-xs text-slate-500">
            ID: <span id="userId">Cargando...</span>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="messageModal" class="fixed inset-0 bg-black/60 flex items-center justify-center opacity-0 pointer-events-none transition-opacity z-50">
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl max-w-sm w-full mx-4 transform scale-95 transition-transform" id="modalContent">
            <h3 class="text-lg font-bold text-white mb-2" id="modalTitle">Aviso</h3>
            <p class="text-slate-300 text-sm mb-5" id="modalMessage">Mensaje aquí.</p>
            <button onclick="closeModal()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-medium py-2 rounded-xl transition-colors">
                Entendido
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔥 CONFIGURACIÓN DE FIREBASE - TU PROYECTO
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDnBl_DxrG9A3Hggvgrc60080okVo9E3E",
            authDomain: "the-game-2874f.firebaseapp.com",
            projectId: "the-game-2874f",
            storageBucket: "the-game-2874f.firebasestorage.app",
            messagingSenderId: "574046109385",
            appId: "1:574046109385:web:b85de400b9c6309c11d718"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let currentUserId = null;
        let gameHistory = [];
        let userStats = {
            totalRounds: 0,
            correctPredictions: 0,
            lastSync: null
        };

        // ==========================================
        // 🔐 AUTENTICACIÓN ANÓNIMA
        // ==========================================
        async function initializeAuth() {
            try {
                auth.signInAnonymously().then((userCredential) => {
                    currentUserId = userCredential.user.uid;
                    document.getElementById('userId').textContent = currentUserId.substring(0, 8) + '...';
                    updateConnectionStatus(true);
                    loadHistoryFromFirebase();
                }).catch((error) => {
                    console.error("Error en autenticación:", error);
                    updateConnectionStatus(false);
                    showMessage("Error de Conexión", "No se pudo conectar con Firebase. Verifica las reglas de seguridad.");
                });
            } catch (error) {
                console.error("Error:", error);
                updateConnectionStatus(false);
            }
        }

        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');
            const btn = document.getElementById('btnRegister');
            
            if (connected) {
                statusEl.className = 'sync-indicator w-3 h-3 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/50';
                textEl.textContent = 'Sincronizado en la nube ✓';
                textEl.className = 'text-emerald-400 text-xs mb-2';
                btn.disabled = false;
            } else {
                statusEl.className = 'sync-indicator w-3 h-3 rounded-full bg-red-500';
                textEl.textContent = 'Sin conexión - Verifica configuración';
                textEl.className = 'text-red-400 text-xs mb-2';
                btn.disabled = true;
            }
        }

        // ==========================================
        //  FIRESTORE - GUARDAR/CARGAR DATOS
        // ==========================================
        async function saveToFirebase(roundData) {
            if (!currentUserId) return;
            
            try {
                const docRef = db.collection('users').doc(currentUserId)
                    .collection('gameHistory').doc();
                
                await docRef.set({
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    roundNumber: gameHistory.length,
                    mines: roundData.mines,
                    prediction: roundData.prediction,
                    createdAt: new Date().toISOString()
                });
                
                // Actualizar estadísticas
                await updateStatsInFirebase();
                
            } catch (error) {
                console.error("Error guardando en Firebase:", error);
                showMessage("Error de Sync", "No se pudo guardar en la nube. Verifica las reglas de Firestore.");
            }
        }

        async function loadHistoryFromFirebase() {
            if (!currentUserId) return;
            
            try {
                const snapshot = await db.collection('users').doc(currentUserId)
                    .collection('gameHistory')
                    .orderBy('createdAt', 'asc')
                    .limit(100)
                    .get();
                
                gameHistory = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.mines) {
                        gameHistory.push(data.mines);
                    }
                });
                
                updateStatusUI();
                if (gameHistory.length > 0) {
                    showMessage("Datos Cargados", `Se cargaron ${gameHistory.length} rondas desde la nube`);
                }
                
            } catch (error) {
                console.error("Error cargando de Firebase:", error);
                showMessage("Error", "No se pudieron cargar los datos. Revisa las reglas de seguridad.");
            }
        }

        async function updateStatsInFirebase() {
            if (!currentUserId) return;
            
            try {
                await db.collection('users').doc(currentUserId).set({
                    totalRounds: userStats.totalRounds,
                    correctPredictions: userStats.correctPredictions,
                    lastSync: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: new Date().toISOString()
                }, { merge: true });
            } catch (error) {
                console.error("Error actualizando stats:", error);
            }
        }

        async function clearHistoryInFirebase() {
            if (!currentUserId) return;
            
            try {
                const snapshot = await db.collection('users').doc(currentUserId)
                    .collection('gameHistory').get();
                
                const batch = db.batch();
                snapshot.forEach((doc) => {
                    batch.delete(doc.ref);
                });
                
                await batch.commit();
                
                // Resetear stats
                userStats = { totalRounds: 0, correctPredictions: 0, lastSync: null };
                await updateStatsInFirebase();
                
            } catch (error) {
                console.error("Error borrando en Firebase:", error);
            }
        }

        // ==========================================
        // 🎮 LÓGICA DEL JUEGO
        // ==========================================
        const gridSize = 5;
        const gridElement = document.getElementById('mineGrid');
        const statusElement = document.getElementById('historyStatus');
        
        let cells = [];
        let stateMode = 'input';

        // Modal Logic
        const modal = document.getElementById('messageModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');

        function showMessage(title, message) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
        }

        function initGrid() {
            gridElement.innerHTML = '';
            cells = [];
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell-transition cursor-pointer rounded-xl bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xl font-bold shadow-inner select-none hover:bg-slate-600 active:scale-95';
                cell.dataset.index = i;
                cell.dataset.isMine = 'false';
                
                cell.addEventListener('click', () => {
                    if(stateMode === 'input') {
                        toggleMine(cell);
                    } else {
                        resetGridForNewInput();
                        toggleMine(cell);
                    }
                });
                
                gridElement.appendChild(cell);
                cells.push(cell);
            }
        }

        function toggleMine(cell) {
            const isMine = cell.dataset.isMine === 'true';
            cell.dataset.isMine = !isMine;
            
            if (!isMine) {
                cell.classList.remove('bg-slate-700', 'border-slate-600', 'hover:bg-slate-600');
                cell.classList.add('bg-red-500/20', 'border-red-500', 'mine-glow', 'text-2xl');
                cell.textContent = '';
            } else {
                cell.classList.add('bg-slate-700', 'border-slate-600', 'hover:bg-slate-600');
                cell.classList.remove('bg-red-500/20', 'border-red-500', 'mine-glow', 'text-2xl');
                cell.textContent = '';
            }
        }

        function resetGridForNewInput() {
            stateMode = 'input';
            cells.forEach(cell => {
                cell.dataset.isMine = 'false';
                cell.className = 'cell-transition cursor-pointer rounded-xl bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xl font-bold shadow-inner select-none hover:bg-slate-600 active:scale-95 text-slate-100';
                cell.textContent = '';
            });
            document.getElementById('btnText').textContent = 'Calcular Próxima Ronda';
        }

        function calculateProbability() {
            if (stateMode === 'result') {
                resetGridForNewInput();
                return;
            }

            const currentRoundMines = cells.map(c => c.dataset.isMine === 'true');
            const totalMinesMarked = currentRoundMines.filter(m => m).length;

            if (totalMinesMarked === 0) {
                showMessage("Tablero Vacío", "Marca las minas de la ronda actual antes de calcular.");
                return;
            }

            // Guardar en historial local
            gameHistory.push(currentRoundMines);
            if (gameHistory.length > 100) {
                gameHistory.shift();
            }
            
            updateStatusUI();
            stateMode = 'result';

            // Guardar en Firebase
            saveToFirebase({
                mines: currentRoundMines,
                prediction: 'calculated'
            });

            // Calcular probabilidades
            cells.forEach((cell, index) => {
                let mineFrequency = 0;
                let roundsAgoLastMine = 99;

                for (let i = gameHistory.length - 1; i >= 0; i--) {
                    if (gameHistory[i][index]) {
                        mineFrequency++;
                        if (roundsAgoLastMine === 99) {
                            roundsAgoLastMine = (gameHistory.length - 1) - i;
                        }
                    }
                }

                let safetyPercentage = 95;
                safetyPercentage -= (mineFrequency * 12);
                
                if (roundsAgoLastMine === 0) {
                    safetyPercentage -= 15;
                }
                
                if (roundsAgoLastMine >= 4) {
                    safetyPercentage += 10;
                }

                const row = Math.floor(index / gridSize);
                const col = index % gridSize;
                const neighbors = [index - gridSize, index + gridSize, index - 1, index + 1];
                let adjacentMinesInLastRound = 0;

                if (gameHistory.length > 0) {
                    const lastRound = gameHistory[gameHistory.length - 1];
                    neighbors.forEach(n => {
                        if (n >= 0 && n < 25) {
                            if ((col === 0 && n === index - 1) || (col === gridSize - 1 && n === index + 1)) return;
                            if (lastRound[n]) adjacentMinesInLastRound++;
                        }
                    });
                }

                safetyPercentage -= (adjacentMinesInLastRound * 5);
                safetyPercentage = Math.max(10, Math.min(98, safetyPercentage));

                applyHeatmap(cell, safetyPercentage);
            });

            document.getElementById('btnText').textContent = 'Ingresar Nueva Ronda';
        }

        function applyHeatmap(cell, safeScore) {
            cell.className = 'cell-transition flex items-center justify-center text-base sm:text-lg font-bold rounded-xl shadow-inner select-none transition-all duration-500';
            
            if (safeScore >= 80) {
                cell.classList.add('bg-emerald-500/20', 'border-2', 'border-emerald-500/50', 'text-emerald-400');
            } else if (safeScore >= 50) {
                cell.classList.add('bg-amber-500/20', 'border-2', 'border-amber-500/50', 'text-amber-400');
            } else {
                cell.classList.add('bg-red-500/20', 'border-2', 'border-red-500/50', 'text-red-400');
            }
            
            cell.textContent = `${Math.floor(safeScore)}%`;
        }

        function updateStatusUI() {
            const statusText = `Rondas: ${gameHistory.length}`;
            statusElement.innerHTML = `
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${gameHistory.length > 0 ? 'bg-emerald-400' : 'bg-blue-400'} opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 ${gameHistory.length > 0 ? 'bg-emerald-500' : 'bg-blue-500'}"></span>
                </span>
                ${statusText}
            `;
            
            if(gameHistory.length > 0) {
                statusElement.classList.replace('bg-blue-900/50', 'bg-emerald-900/50');
                statusElement.classList.replace('text-blue-300', 'text-emerald-300');
                statusElement.classList.replace('border-blue-800/50', 'border-emerald-800/50');
            }
        }

        async function clearHistory() {
            if (confirm('¿Borrar todo el historial? Esta acción no se puede deshacer.')) {
                gameHistory = [];
                updateStatusUI();
                resetGridForNewInput();
                await clearHistoryInFirebase();
                showMessage("Memoria Borrada", "Historial eliminado de la nube y localmente");
            }
        }

        // Exportar/Importar datos (backup manual)
        function exportData() {
            const data = {
                history: gameHistory,
                stats: userStats,
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mines-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showMessage("Exportado", "Datos descargados correctamente");
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.history && Array.isArray(data.history)) {
                            gameHistory = data.history;
                            updateStatusUI();
                            showMessage("Importado", `${data.history.length} rondas cargadas`);
                        }
                    } catch (err) {
                        showMessage("Error", "Archivo inválido");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Event Listeners
        document.getElementById('btnRegister').addEventListener('click', calculateProbability);
        document.getElementById('btnReset').addEventListener('click', resetGridForNewInput);
        document.getElementById('btnClearHistory').addEventListener('click', clearHistory);
        document.getElementById('btnExport').addEventListener('click', exportData);
        document.getElementById('btnImport').addEventListener('click', importData);

        // Inicializar
        window.onload = () => {
            initGrid();
            initializeAuth();
        };
    </script>
</body>
</html>
